name: roman-mast-tools
channels:
  - conda-forge
dependencies:
  - python=3.12
  - numpy
  - matplotlib
  - astropy
  - tqdm
  - keyring
  - python-dotenv
  - requests
  - pip
  # astroquery is intentionally NOT pulled from conda-forge — the pip
  # section below installs it from an unreleased PR that adds the Roman
  # MAST streaming support the tools depend on.
  - pip:
      - romancal>=1.0.1
      - roman_datamodels>=1.0.0
      - rad>=1.0.0
      - git+https://github.com/astropy/astroquery.git@refs/pull/3593/head
      - fsspec[s3]
